<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário 1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <main class="container">
        <h3>Formulário 1</h3>
        <div class="card mt-3">
            <div class="card-body">
                <div class="row g-2">
                    <div class="col-4">
                        <label class="form-label">First Name</label>
                        <input class="form-control" placeholder="Mark">
                    </div>
                    <div class="col-4">
                        <label class="form-label">Last Name</label>
                        <input class="form-control" placeholder="Otto">
                    </div>
                    <div class="col-4">
                        <label class="form-label">Username</label>
                        <div class="input-group">
                            <div class="input-group-text">@</div>
                            <input class="form-control" placeholder="Username">
                        </div>
                    </div>
                </div>
                <div class="row mt-3 g-2">
                    <div class="col-6">
                        <label class="form-label">City</label>
                        <input class="form-control" placeholder="City">
                    </div>
                    <div class="col-3">
                        <label class="form-label">State</label>
                        <input class="form-control" placeholder="State">
                    </div>
                    <div class="col-3">
                        <label class="form-label">Zip</label>
                        <input class="form-control" placeholder="Zip">
                    </div>
                    <div class="col mt-3">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="" id="terms">
                            <label class="form-check-label" for="terms">Agree to terms and conditions</label> 
                        </div>
                    <div class="col mt-3">
                        <button class="btn btn-primary">Submit Form</button>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
            
</html>
