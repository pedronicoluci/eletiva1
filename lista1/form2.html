<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulário 2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
</head>

<body>
    <main class="container">
        <h3>Formulário 2 </h3>
        <div class="row g-5">
            <div class="col-1">
                <label class="form-label">Código</label>
                <input class="form-control bg-body-secondary rounded-0 text-center" placeholder="32">
            </div>
            <div class="col-5">
                <label class="form-label">Nome</label>
                <input class="form-control rounded-0" placeholder="Nome Completo do Cliente">
            </div>
            <div class="col-4">
                <label class="form-label">E-mail</label>
                <input class="form-control rounded-0" placeholder="cliente@dominio.com">
            </div>
            <div class="col-2">
                <label class="form-label">CPF</label>
                <input class="form-control rounded-0" placeholder="Só números">
            </div>
            <div class="col-2">
                <label class="form-label">Nº Celular</label>
                <input class="form-control rounded-0" palceholder="Nº do celular">
            </div>
            <div class="col-2">
                <label class="form-label">Nº Telefone fixo</label>
                <input class="form-control rounded-0" placeholder="Nº telefone">
            </div>
            <div class="col-2">
                <label class="form-label">CEP</label>
                <input class="form-control rounded-0" placeholder="ex: 88308070">
            </div>
            <div class="col-2">
                <label class="form-label">Logradouro</label>
                <input class="form-control rounded-0" placeholder="ex: Rua 1400">
            </div>
        </div>

    </main>
</body>

</html>
