<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário 5</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
</head>

<body>
    <main class="container d-flex justify-content-center">
        <div class="card w-50 mt-5 border-0">
            <div class="card-body bg-light">
                <h4 class="card-title">Billing address</h4>
                <div class="row mt-3">
                    <div class="col-6">
                        <label class="form-label">First Name</label>
                        <input class="form-control">
                    </div>
                    <div class="col-6">
                        <label class="form-label">Last Name</label>
                        <input class="form-control">
                    </div>
                </div>
                <div class="row mt-3">
                    <div class="col-12">
                        <label class="form-label">Username</label>
                        <div class="input-group">
                            <div class="input-group-text">@</div>
                            <input class="form-control" placeholder="Username">
                        </div>
                    </div>
                </div>
                <div class="row mt-3">
                    <div class="col-12">
                        <label class="form-label">Email<span class="text-body-secondary"> (Optional)</span></label>
                        <input class="form-control" placeholder="you@example.com">
                    </div>
                </div>
                <div class="row mt-3">
                    <div class="col-12">
                        <label class="form-label">Address</label>
                        <input class="form-control" placeholder="1234 Main St">
                    </div>
                </div>
                <div class="row mt-3">
                    <div class="col-12">
                        <label class="form-label">Address 2<span class="text-body-secondary"> (Optional)</span></label>
                        <input class="form-control" placeholder="Apartment or suite">
                    </div>
                </div>
                <div class="row mt-3">
                    <div class="col-5">
                        <label class="form-label">Country</label>
                        <select class="form-select">
                            <option selected>Choose...</option>
                        </select>
                    </div>
                    <div class="col-4">
                        <label class="form-label">State</label>
                        <select class="form-select">
                            <option selected>Choose...</option>
                        </select>
                    </div>
                    <div class="col-3">
                        <label class="form-label">Zip</label>
                        <input class="form-control">
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
