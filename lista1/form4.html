<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário 4</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
</head>

<body>
    <main class="container">
        <h1>Novo Usuário</h1>

        <div class="row mt-4 mb-3">
            <div class="col-12">
                <label class="form-label col-form-label fw-bold">Nome:</label>
                <input class="form-control" placeholder="Informe o nome">
            </div>
        </div>
        <div class="row mb-3">
            <div class="col-3">
                <label class="form-label fw-bold">CPF:</label>
                <input class="form-control" placeholder="Informe o CPF">
            </div>
            <div class="col-7">
                <label class="form-label fw-bold">Endereço:</label>
                <input class="form-control" placeholder="Informe o endereço">
            </div>
            <div class="col-2">
                <label class="form-label fw-bold">Nivel:</label>
                <select class="form-select">
                    <option selected>---</option>
                </select>
            </div>
        </div>
        <div class="row mb-3">
            <div class="col-6">
                <label class="form-label fw-bold">Email:</label>
                <input class="form-control" placeholder="Informe o email">
            </div>
            <div class="col-4">
                <label class="form-label fw-bold">Senha:</label>
                <input class="form-control" placeholder="Informe a senha">
            </div>
            <div class="col-2">
                <label class="form-label fw-bold">Status:</label>
                <select class="form-select">
                    <option selected>---</option>
                    <option selected>Ativo</option>
                </select>
            </div>
        </div>
        <div class="text-end">
            <button type="button" class="btn btn-success fw-bold">Enviar</button>
            <button type="button" class="btn btn-outline-secondary fw-bold">Cancelar</button>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
